services:
  pds:
    image: ghcr.io/bluesky-social/pds:latest
    container_name: pds
    restart: unless-stopped
    volumes:
      # Everything durable (accounts, repo records, blob store, PLC rotation
      # key) lives under /pds inside the container. Without this bind mount,
      # recreating the container destroys the node's identity and history.
      - /home/cprice/pds-data:/pds
    env_file:
      - pds.env
    ports:
      - "3000:3000"
